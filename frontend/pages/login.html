<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="container">
        <h2 style="display: flex; justify-content: center;">Smart Expense Dashboard</h2><br><br>
        <form action="/login" method="POST">
            <div class="form-group">    
                <label for="email">อีเมล</label><br>
                <input type="email" id="email" name="email"  placeholder="your@email.com" required><br><br>
            </div>
            
            <div class="form-group">
                <label for="password">รหัสผ่าน</label><br>
                <input type="password" id="password" name="password" placeholder="•••••••••" required><br><br>
            </div>

            <button type="submit">เข้าสู่ระบบ</button><br><br>
            <small class="note">*ใช้อีเมลและรหัสผ่านใดก็ได้เพื่อเข้าสู่ระบบ</small>
        </form>
    </div>


    
</body>
</html>
